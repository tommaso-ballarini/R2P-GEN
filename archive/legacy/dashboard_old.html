
    <!DOCTYPE html>
    <html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>R2P-GEN Verify Dashboard</title>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f5f7; color: #333; margin: 0; padding: 20px; }
            h1 { text-align: center; color: #2c3e50; }
            .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; padding: 20px; border-left: 5px solid #bdc3c7; }
            .card.rejected { border-left-color: #e74c3c; }
            .card.verified { border-left-color: #2ecc71; }
            .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
            .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.9em; font-weight: bold; color: white; }
            .badge-rejected { background-color: #e74c3c; }
            .badge-verified { background-color: #2ecc71; }
            .badge-unknown { background-color: #95a5a6; }
            .images-container { display: flex; gap: 20px; margin-bottom: 20px; }
            .image-box { flex: 1; text-align: center; }
            .image-box img { max-width: 100%; max-height: 400px; border-radius: 4px; border: 1px solid #ddd; }
            .prompt-box { background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9em; margin-bottom: 20px; }
            h3 { margin-top: 0; color: #34495e; font-size: 1.1em; border-bottom: 2px solid #eee; padding-bottom: 5px;}
            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9em; }
            th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
            th { background-color: #f2f2f2; }
            .code-json { background: #272822; color: #f8f8f2; padding: 5px; border-radius: 4px; display: inline-block; }
        </style>
    </head>
    <body>
        <h1>🔍 R2P-GEN Dashboard Ispezione</h1>
        <div style="max-width: 1200px; margin: auto;">
    
        </div>
    </body>
    </html>
